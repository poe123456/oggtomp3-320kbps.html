<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>批量 OGG 转 MP3 | 320kbps 高质量转换器</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0a0e14 0%, #151e2a 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .card {
      max-width: 1000px;
      width: 100%;
      background: rgba(18, 24, 32, 0.92);
      backdrop-filter: blur(4px);
      border-radius: 48px;
      padding: 32px 28px 40px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
      transition: all 0.2s ease;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin: 0 0 0.25rem 0;
      background: linear-gradient(135deg, #F9F3E2, #D9E0F0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .badge-quality {
      background: #f4a26133;
      border: 1px solid #f4a261;
      border-radius: 100px;
      font-size: 0.8rem;
      padding: 4px 14px;
      color: #ffd9a5;
      font-weight: 500;
    }

    .sub {
      color: #9aa9c1;
      font-size: 0.9rem;
      margin-bottom: 2rem;
      border-left: 3px solid #e76f51;
      padding-left: 12px;
    }

    .drop-zone {
      background: #1e2837;
      border: 2px dashed #e76f51;
      border-radius: 32px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 1.5rem;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      background: #2a3548;
      border-color: #f4a261;
      transform: scale(0.99);
    }

    .drop-zone svg {
      width: 56px;
      opacity: 0.8;
      margin-bottom: 12px;
    }

    .drop-text {
      color: #f0e6d0;
      font-weight: 600;
      font-size: 1.1rem;
    }

    .limit-info {
      font-size: 0.75rem;
      margin-top: 8px;
      color: #e9c46a;
      background: #2a241a;
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      background: #0f151f;
      padding: 12px 20px;
      border-radius: 60px;
      margin: 12px 0 20px;
      gap: 12px;
    }

    .stats-count {
      font-size: 0.9rem;
      color: #b9d0ff;
    }

    .stats-count span {
      font-weight: bold;
      color: #f4a261;
      font-size: 1.2rem;
    }

    .clear-btn {
      background: #2f3e4e;
      border: none;
      padding: 6px 18px;
      border-radius: 40px;
      color: #ffcf9a;
      cursor: pointer;
      font-weight: 500;
      transition: 0.1s;
    }

    .clear-btn:hover {
      background: #4a5e72;
      color: white;
    }

    .file-list-container {
      max-height: 360px;
      overflow-y: auto;
      border-radius: 28px;
      background: #0c111a;
      margin: 16px 0;
      border: 1px solid #2a3648;
    }

    .file-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .file-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #202a36;
      gap: 12px;
      flex-wrap: wrap;
    }

    .file-list-item:last-child {
      border-bottom: none;
    }

    .file-info-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 3;
      min-width: 180px;
    }

    .file-icon {
      font-size: 1.3rem;
    }

    .file-details {
      overflow: hidden;
    }

    .file-name {
      font-family: monospace;
      font-size: 0.8rem;
      color: #d6e6ff;
      word-break: break-all;
    }

    .file-meta {
      font-size: 0.65rem;
      color: #7d8aa5;
    }

    .file-status {
      font-size: 0.75rem;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 40px;
      background: #1e2936;
      min-width: 110px;
      text-align: center;
    }

    .status-pending {
      color: #ffb347;
      background: #3a2a1a;
    }

    .status-processing {
      color: #6bcbff;
      background: #1e3a4a;
    }

    .status-success {
      color: #8bffb0;
      background: #1e4532;
    }

    .status-error {
      color: #ff9b8f;
      background: #4e2a27;
    }

    .download-single {
      background: #2c4f4a;
      border: none;
      border-radius: 30px;
      padding: 5px 12px;
      color: white;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 600;
      transition: 0.1s;
    }

    .download-single:hover {
      background: #3f756b;
    }

    .convert-all-btn {
      background: linear-gradient(105deg, #e76f51, #bc5a3c);
      border: none;
      width: 100%;
      padding: 14px 0;
      font-size: 1.1rem;
      font-weight: 700;
      color: white;
      border-radius: 80px;
      cursor: pointer;
      transition: 0.2s;
      margin: 16px 0 12px;
      box-shadow: 0 8px 14px rgba(0, 0, 0, 0.4);
    }

    .convert-all-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: #6f5e55;
    }

    .progress-global {
      background: #0c1018;
      border-radius: 60px;
      height: 8px;
      margin: 12px 0 8px;
      overflow: hidden;
    }

    .progress-global-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #f4a261, #e76f51);
      border-radius: 60px;
      transition: width 0.2s;
    }

    .status-global {
      font-size: 0.85rem;
      text-align: center;
      color: #bdccf0;
      margin: 10px 0;
      min-height: 44px;
    }

    .batch-actions {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .download-all-btn {
      background: #2b6a5c;
      border: none;
      padding: 10px 22px;
      border-radius: 60px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      flex: 1;
      text-align: center;
    }

    .download-all-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .footnote {
      font-size: 0.7rem;
      text-align: center;
      color: #65758b;
      margin-top: 28px;
    }

    button {
      font-family: inherit;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #141c26;
      border-radius: 8px;
    }
    ::-webkit-scrollbar-thumb {
      background: #e76f51;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>
    🎵 OGG → MP3 
    <span class="badge-quality">🔊 320 kbps 固定高质量</span>
  </h1>
  <div class="sub">批量转换 · 最多 300 个 OGG 文件 · 纯浏览器本地处理 (320kbps MP3)</div>

  <!-- 拖拽区域 -->
  <div class="drop-zone" id="dropZone">
    <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="#f4a261" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 16V4M8 8L12 4L16 8" />
      <path d="M4 14V18C4 19.1046 4.89543 20 6 20H18C19.1046 20 20 19.1046 20 18V14" />
      <rect x="2" y="14" width="20" height="2" rx="1" />
    </svg>
    <div class="drop-text">📂 拖放 OGG 文件或点击选择 (支持多选)</div>
    <div class="limit-info">📎 最多 300 个文件 · 仅限 .ogg 格式</div>
    <input type="file" id="fileInput" accept=".ogg,audio/ogg" multiple style="display: none;" />
  </div>

  <!-- 统计 & 清空 -->
  <div class="stats-bar">
    <div class="stats-count">📦 文件队列: <span id="fileCount">0</span> / 300</div>
    <button class="clear-btn" id="clearAllBtn">🗑️ 清空所有</button>
  </div>

  <!-- 文件列表 -->
  <div class="file-list-container">
    <ul class="file-list" id="fileList"></ul>
  </div>

  <!-- 全局控制 -->
  <button class="convert-all-btn" id="convertAllBtn" disabled>⚡ 开始转换全部 (320kbps MP3)</button>
  
  <div class="progress-global">
    <div class="progress-global-bar" id="globalProgress"></div>
  </div>
  <div class="status-global" id="globalStatus">✅ 准备就绪 · 最多支持 300 个 OGG 文件</div>

  <div class="batch-actions">
    <button class="download-all-btn" id="downloadAllBtn" disabled>📥 下载全部已转换 MP3 (ZIP)</button>
  </div>
  <div class="footnote">
    🔒 完全本地转换 (Web Audio + lamejs) · 固定 320kbps 高品质 MP3 · 文件绝不离开设备 · 最大并发数 300
  </div>
</div>

<!-- 引入 lamejs 和 JSZip -->
<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
  (function() {
    // DOM elements
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileListEl = document.getElementById('fileList');
    const fileCountSpan = document.getElementById('fileCount');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const convertAllBtn = document.getElementById('convertAllBtn');
    const globalProgressBar = document.getElementById('globalProgress');
    const globalStatusDiv = document.getElementById('globalStatus');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    
    // 固定比特率 320kbps
    const TARGET_BITRATE = 320;
    
    // 存储文件对象数组 { file, id, status, errorMsg, mp3Blob, fileName }
    let fileItems = [];
    let nextId = 0;
    let isConverting = false;       // 防止重复点击转换
    let conversionAbort = false;    // 用于清空时中断转换 (简单标志)
    
    // 辅助: 格式化字节
    function formatBytes(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }
    
    // 刷新 UI 列表
    function renderFileList() {
      if (!fileListEl) return;
      fileListEl.innerHTML = '';
      for (let item of fileItems) {
        const li = document.createElement('li');
        li.className = 'file-list-item';
        li.dataset.id = item.id;
        
        // 左侧信息
        const leftDiv = document.createElement('div');
        leftDiv.className = 'file-info-left';
        leftDiv.innerHTML = `
          <div class="file-icon">🎵</div>
          <div class="file-details">
            <div class="file-name">${escapeHtml(item.file.name.length > 50 ? item.file.name.slice(0, 47) + '...' : item.file.name)}</div>
            <div class="file-meta">${formatBytes(item.file.size)}</div>
          </div>
        `;
        
        // 状态区
        const statusSpan = document.createElement('div');
        statusSpan.className = `file-status`;
        let statusText = '';
        let statusClass = '';
        switch (item.status) {
          case 'pending': statusText = '⏳ 等待中'; statusClass = 'status-pending'; break;
          case 'processing': statusText = '🔄 转换中...'; statusClass = 'status-processing'; break;
          case 'success': statusText = '✅ 已完成'; statusClass = 'status-success'; break;
          case 'error': statusText = `❌ ${item.errorMsg || '失败'}`; statusClass = 'status-error'; break;
          default: statusText = '📄 待转换'; statusClass = 'status-pending';
        }
        statusSpan.textContent = statusText;
        statusSpan.classList.add(statusClass);
        
        // 单个下载按钮 (仅在成功时显示)
        const downloadBtn = document.createElement('button');
        if (item.status === 'success' && item.mp3Blob) {
          downloadBtn.textContent = '💾 下载 MP3';
          downloadBtn.className = 'download-single';
          downloadBtn.onclick = (e) => {
            e.stopPropagation();
            downloadSingleMP3(item);
          };
        } else {
          downloadBtn.textContent = '⛔ 未就绪';
          downloadBtn.disabled = true;
          downloadBtn.className = 'download-single';
          downloadBtn.style.opacity = '0.5';
        }
        
        li.appendChild(leftDiv);
        li.appendChild(statusSpan);
        li.appendChild(downloadBtn);
        fileListEl.appendChild(li);
      }
      fileCountSpan.textContent = fileItems.length;
      // 控制转换按钮禁用状态
      const hasPending = fileItems.some(i => i.status === 'pending');
      convertAllBtn.disabled = isConverting || fileItems.length === 0 || !hasPending;
      // 下载全部按钮: 至少有一个成功的mp3Blob
      const hasAnySuccess = fileItems.some(i => i.status === 'success' && i.mp3Blob);
      downloadAllBtn.disabled = isConverting || !hasAnySuccess;
    }
    
    // 简单防XSS
    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    // 添加文件 (限制最大300)
    function addFiles(files) {
      if (isConverting) {
        globalStatusDiv.innerHTML = '⚠️ 转换进行中，请等待完成或清空后再添加文件。';
        return;
      }
      let added = 0;
      for (let f of files) {
        if (fileItems.length + added >= 300) {
          globalStatusDiv.innerHTML = `⚠️ 已达到最大文件数 300，剩余文件被忽略。`;
          break;
        }
        if (!f.type.includes('ogg') && !f.name.toLowerCase().endsWith('.ogg')) {
          continue; // 忽略非ogg
        }
        // 避免重复添加同名完全相同的文件？简单基于名称+大小快速去重(可选)
        const duplicate = fileItems.some(ex => ex.file.name === f.name && ex.file.size === f.size);
        if (duplicate) continue;
        
        fileItems.push({
          id: nextId++,
          file: f,
          status: 'pending',
          errorMsg: null,
          mp3Blob: null,
          fileName: f.name.replace(/\.ogg$/i, '') || 'audio'
        });
        added++;
      }
      if (added > 0) {
        renderFileList();
        globalStatusDiv.innerHTML = `✅ 已添加 ${added} 个文件，总计 ${fileItems.length} 个待转换 (320kbps)`;
      } else if (files.length > 0) {
        globalStatusDiv.innerHTML = `⚠️ 未添加任何 .ogg 文件 (可能已达上限或格式不符)`;
      }
    }
    
    // 清空所有
    function clearAll() {
      if (isConverting) {
        conversionAbort = true;
        globalStatusDiv.innerHTML = '🛑 正在中断转换，请稍后...';
        setTimeout(() => {
          if (isConverting) {
            isConverting = false;
            conversionAbort = false;
            resetAfterAbort();
          }
        }, 200);
        return;
      }
      resetAfterAbort();
    }
    
    function resetAfterAbort() {
      // 释放所有 blob URL
      for (let item of fileItems) {
        if (item.mp3Blob && item.mp3Blob._url) {
          URL.revokeObjectURL(item.mp3Blob._url);
        }
      }
      fileItems = [];
      nextId = 0;
      isConverting = false;
      conversionAbort = false;
      renderFileList();
      globalProgressBar.style.width = '0%';
      globalStatusDiv.innerHTML = '🗑️ 已清空所有文件，可以重新添加 OGG。';
      convertAllBtn.disabled = false;
      downloadAllBtn.disabled = true;
    }
    
    // 核心转换: OGG -> MP3 (320kbps)
    async function convertSingleOGGtoMP3(file, itemId) {
      const item = fileItems.find(i => i.id === itemId);
      if (!item) throw new Error('Item not found');
      
      return new Promise(async (resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
          const arrayBuffer = e.target.result;
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          try {
            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            const channels = audioBuffer.numberOfChannels;
            const sampleRate = audioBuffer.sampleRate;
            const length = audioBuffer.length;
            
            // 获取左右声道 PCM Float32
            let leftData = audioBuffer.getChannelData(0);
            let rightData = channels >= 2 ? audioBuffer.getChannelData(1) : null;
            
            // 转为 Int16
            function floatToInt16(floatArr) {
              const int16 = new Int16Array(floatArr.length);
              for (let i = 0; i < floatArr.length; i++) {
                let s = Math.max(-1, Math.min(1, floatArr[i]));
                s = s < 0 ? s * 0x8000 : s * 0x7FFF;
                int16[i] = Math.floor(s);
              }
              return int16;
            }
            
            const leftInt = floatToInt16(leftData);
            const rightInt = rightData ? floatToInt16(rightData) : null;
            const numChannels = (channels >= 2) ? 2 : 1;
            
            // 采样率兼容 lamejs 支持的常用采样率 (保留原始采样率，但如果不匹配则用最近的)
            let encSampleRate = sampleRate;
            const supportedRates = [8000, 11025, 12000, 16000, 22050, 24000, 32000, 44100, 48000];
            if (!supportedRates.includes(encSampleRate)) {
              encSampleRate = encSampleRate > 48000 ? 48000 : (encSampleRate > 44100 ? 44100 : 44100);
            }
            
            const encoder = new lamejs.Mp3Encoder(numChannels, encSampleRate, TARGET_BITRATE);
            const mp3Chunks = [];
            const sampleBlockSize = 1152;
            let samplesProcessed = 0;
            const totalSamples = leftInt.length;
            
            while (samplesProcessed < totalSamples) {
              if (conversionAbort) {
                throw new Error("转换被用户中断");
              }
              const remaining = totalSamples - samplesProcessed;
              const chunkSize = Math.min(sampleBlockSize, remaining);
              let mp3buf;
              if (numChannels === 2) {
                const leftChunk = new Int16Array(chunkSize);
                const rightChunk = new Int16Array(chunkSize);
                for (let i = 0; i < chunkSize; i++) {
                  leftChunk[i] = leftInt[samplesProcessed + i];
                  rightChunk[i] = rightInt[samplesProcessed + i];
                }
                mp3buf = encoder.encodeBuffer(leftChunk, rightChunk);
              } else {
                const leftChunk = new Int16Array(chunkSize);
                for (let i = 0; i < chunkSize; i++) {
                  leftChunk[i] = leftInt[samplesProcessed + i];
                }
                mp3buf = encoder.encodeBuffer(leftChunk);
              }
              if (mp3buf.length > 0) mp3Chunks.push(mp3buf);
              samplesProcessed += chunkSize;
              
              // 更新此项目的状态进度 (不刷新全部列表，但可以稍后更新)
              const percent = Math.floor((samplesProcessed / totalSamples) * 100);
              if (item.status === 'processing') {
                // 可选: 更新状态文字但是不频繁重绘，最终 render 会在完成后统一调用
              }
            }
            const final = encoder.flush();
            if (final.length > 0) mp3Chunks.push(final);
            const mp3Blob = new Blob(mp3Chunks, { type: 'audio/mpeg' });
            await audioContext.close();
            resolve(mp3Blob);
          } catch (err) {
            await audioContext.close();
            reject(err);
          }
        };
        reader.onerror = () => reject(new Error("文件读取失败"));
        reader.readAsArrayBuffer(file);
      });
    }
    
    // 批量转换入口 (顺序执行，避免过多并发和内存压力，最多300个但串行更稳定)
    async function startBatchConversion() {
      if (isConverting) {
        globalStatusDiv.innerHTML = '⚠️ 已有转换任务进行中，请稍后或清空重试。';
        return;
      }
      const pendingItems = fileItems.filter(i => i.status === 'pending');
      if (pendingItems.length === 0) {
        globalStatusDiv.innerHTML = '🎉 没有待转换的文件，请先添加 OGG 文件。';
        return;
      }
      isConverting = true;
      conversionAbort = false;
      convertAllBtn.disabled = true;
      downloadAllBtn.disabled = true;
      
      let completed = 0;
      const total = pendingItems.length;
      globalProgressBar.style.width = '0%';
      globalStatusDiv.innerHTML = `🚀 开始批量转换 ${total} 个文件 (固定 320kbps MP3) ...`;
      
      for (let i = 0; i < pendingItems.length; i++) {
        if (conversionAbort) {
          globalStatusDiv.innerHTML = `⛔ 转换已中断，已处理 ${completed}/${total} 个文件。`;
          break;
        }
        const item = pendingItems[i];
        const idx = fileItems.findIndex(f => f.id === item.id);
        if (idx === -1) continue;
        fileItems[idx].status = 'processing';
        renderFileList();
        
        try {
          const mp3Blob = await convertSingleOGGtoMP3(item.file, item.id);
          if (conversionAbort) throw new Error('中断');
          fileItems[idx].mp3Blob = mp3Blob;
          fileItems[idx].status = 'success';
          fileItems[idx].errorMsg = null;
          // 为每个blob生成临时url, 方便后续单个下载
          if (!mp3Blob._url) {
            mp3Blob._url = URL.createObjectURL(mp3Blob);
          }
        } catch (err) {
          console.error(`转换失败 ${item.file.name}:`, err);
          fileItems[idx].status = 'error';
          fileItems[idx].errorMsg = err.message || '解码或编码错误';
          fileItems[idx].mp3Blob = null;
        }
        completed++;
        const percent = Math.floor((completed / total) * 100);
        globalProgressBar.style.width = percent + '%';
        globalStatusDiv.innerHTML = `🔄 进度: ${completed}/${total} (${percent}%) - 当前: ${fileItems.find(f=>f.id===item.id)?.status === 'success' ? '✅成功' : '⚠️失败'} `;
        renderFileList();
      }
      
      isConverting = false;
      const successCount = fileItems.filter(i => i.status === 'success').length;
      globalStatusDiv.innerHTML = `✨ 批量转换完成! 成功: ${successCount} / ${total} 个文件。可单个下载或打包下载ZIP。`;
      convertAllBtn.disabled = false;
      const hasAnySuccess = fileItems.some(i => i.status === 'success' && i.mp3Blob);
      downloadAllBtn.disabled = !hasAnySuccess;
      conversionAbort = false;
    }
    
    // 单个下载
    function downloadSingleMP3(item) {
      if (!item.mp3Blob) return;
      const url = item.mp3Blob._url || URL.createObjectURL(item.mp3Blob);
      if (!item.mp3Blob._url && url) item.mp3Blob._url = url;
      const a = document.createElement('a');
      const finalName = `${item.fileName.replace(/[\\/:*?"<>|]/g, '')}.mp3`;
      a.href = url;
      a.download = finalName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      globalStatusDiv.innerHTML = `📥 下载: ${finalName}`;
    }
    
    // 打包所有成功的 MP3 为 ZIP
    async function downloadAllAsZip() {
      const successItems = fileItems.filter(i => i.status === 'success' && i.mp3Blob);
      if (successItems.length === 0) {
        globalStatusDiv.innerHTML = '❌ 没有成功转换的文件可打包。';
        return;
      }
      globalStatusDiv.innerHTML = `📦 正在打包 ${successItems.length} 个 MP3 文件，请稍候...`;
      const zip = new JSZip();
      for (let item of successItems) {
        const blob = item.mp3Blob;
        const fileName = `${item.fileName.replace(/[\\/:*?"<>|]/g, '')}.mp3`;
        zip.file(fileName, blob, { binary: true });
      }
      const zipBlob = await zip.generateAsync({ type: 'blob' });
      const zipUrl = URL.createObjectURL(zipBlob);
      const a = document.createElement('a');
      a.href = zipUrl;
      a.download = `ogg_to_mp3_${new Date().toISOString().slice(0,19)}.zip`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(zipUrl);
      globalStatusDiv.innerHTML = `🎁 ZIP 打包完成，已开始下载。`;
    }
    
    // 拖拽与文件选择
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const files = Array.from(e.dataTransfer.files);
      if (files.length) addFiles(files);
    });
    dropZone.addEventListener('click', () => {
      if (isConverting) {
        globalStatusDiv.innerHTML = '⏳ 转换中，请稍后再添加文件。';
        return;
      }
      fileInput.click();
    });
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length) {
        addFiles(Array.from(e.target.files));
        fileInput.value = '';
      }
    });
    
    clearAllBtn.addEventListener('click', clearAll);
    convertAllBtn.addEventListener('click', startBatchConversion);
    downloadAllBtn.addEventListener('click', downloadAllAsZip);
    
    // 初始空列表渲染
    renderFileList();
    if (typeof lamejs === 'undefined') {
      globalStatusDiv.innerHTML = '⚠️ 加载编码库中，请刷新或检查网络...';
    } else {
      globalStatusDiv.innerHTML = '🎧 就绪 · 最多300个OGG，固定320kbps MP3';
    }
  })();
</script>
</body>
</html>
